<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0A0E14" />
  <meta name="description" content="ScorePick — социальная игра-предсказание счёта футбольных матчей для компании друзей." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ScorePick" />
  <title>ScorePick — Угадай счёт</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%26%23x26BD%3B%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <!-- Анимированный фон -->
  <div class="bg-mesh" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Каркас приложения -->
  <div id="app" class="app-shell">
    <main id="view" class="view" role="main"><!-- экраны рендерятся сюда --></main>

    <!-- Нижняя навигация (мобайл) -->
    <nav id="tabbar" class="tabbar" role="navigation" aria-label="Главная навигация">
      <a href="#/home" class="tab" data-tab="home">
        <span class="tab-ic" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg></span>
        <span class="tab-label">Главная</span>
      </a>
      <a href="#/fixtures" class="tab" data-tab="fixtures">
        <span class="tab-ic" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3v18M3 12h18"/><path d="M12 7.5 8.5 10l1.3 4h4.4l1.3-4z"/></svg></span>
        <span class="tab-label">Матчи</span>
      </a>
      <button class="tab tab-fab" data-action="quick-create" aria-label="Создать игру">
        <span class="fab-plus" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></span>
      </button>
      <a href="#/rooms" class="tab" data-tab="rooms">
        <span class="tab-ic" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13A4 4 0 0 1 16 11"/></svg></span>
        <span class="tab-label">Комнаты</span>
      </a>
      <a href="#/history" class="tab" data-tab="history">
        <span class="tab-ic" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></svg></span>
        <span class="tab-label">История</span>
      </a>
    </nav>
  </div>

  <!-- Контейнер для тостов -->
  <div id="toast-root" class="toast-root" aria-live="polite"></div>

  <!-- Контейнер для модалок / шторок -->
  <div id="sheet-root"></div>

  <!-- Экран загрузки / ошибки -->
  <div id="boot" class="boot">
    <div class="boot-logo">
      <div class="boot-ball">⚽</div>
      <div class="boot-name">ScorePick</div>
    </div>
    <div class="boot-spinner"></div>
    <div id="boot-msg" class="boot-msg">Загружаем данные…</div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/screens.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {/* офлайн необязателен */});
      });
    }
  </script>
</body>
</html>
